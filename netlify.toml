# Static site — no build step. The page pulls live scores from ESPN in the
# browser and the daily snapshot from GitHub raw, so deploys are just files.
[build]
  publish = "public"
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Short cache on the app modules so a logic change goes live promptly during the
# tournament (files are tiny). Data itself is fetched fresh at runtime.
[[headers]]
  for = "/app/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
