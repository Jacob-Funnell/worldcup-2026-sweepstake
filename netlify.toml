# Static site — no build step. The page pulls live scores from ESPN in the
# browser and the daily snapshot from GitHub raw, so deploys are just files.
[build]
  publish = "public"
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Long-cache the immutable app modules/styles; data is fetched live at runtime.
[[headers]]
  for = "/app/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
